<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>簡單測試</title>
</head>
<body>
    <h2>簡單按鈕測試</h2>
    
    <div>
        <button id="testBtn">測試按鈕點擊</button>
        <button id="bluetoothBtn">測試藍牙掃描</button>
    </div>
    
    <div id="logs" style="border: 1px solid #ccc; padding: 10px; margin: 10px 0; height: 300px; overflow-y: scroll;">
    </div>

    <script>
        function log(message) {
            const div = document.getElementById('logs');
            div.innerHTML += `[${new Date().toLocaleTimeString()}] ${message}<br>`;
            div.scrollTop = div.scrollHeight;
        }

        async function testBluetooth() {
            log("測試藍牙功能...");
            
            if (!navigator.bluetooth) {
                log("❌ 瀏覽器不支援 Web Bluetooth");
                return;
            }
            
            log("✅ 瀏覽器支援 Web Bluetooth");
            
            try {
                log("正在請求設備選擇...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });
                
                log(`✅ 選擇了設備: ${device.name || '未命名'}`);
                
            } catch (error) {
                log(`❌ 錯誤: ${error.message}`);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            log("頁面載入完成");
            
            document.getElementById('testBtn').onclick = () => {
                log("✅ 測試按鈕點擊正常！");
            };
            
            document.getElementById('bluetoothBtn').onclick = () => {
                log("藍牙按鈕被點擊");
                testBluetooth();
            };
            
            log("事件綁定完成");
        });
    </script>
</body>
</html>
