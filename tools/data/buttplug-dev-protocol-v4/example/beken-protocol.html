<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BEKEN 協議測試</title>
</head>
<body>
    <h2>BEKEN 協議測試 (基於通知)</h2>
    
    <div>
        <button id="connectBtn" style="padding: 10px; margin: 5px; background: blue; color: white;">連接 ERICA</button>
        <button id="notifyBtn" style="padding: 10px; margin: 5px; background: green; color: white;">啟用通知</button>
        <button id="handshakeBtn" style="padding: 10px; margin: 5px; background: orange; color: white;">握手測試</button>
        <button id="vibrateBtn" style="padding: 10px; margin: 5px; background: red; color: white;">振動測試</button>
    </div>
    
    <div id="logs" style="border: 1px solid #ccc; padding: 10px; margin: 10px 0; height: 500px; overflow-y: scroll; font-family: monospace; font-size: 11px;">
    </div>

    <script>
        let device = null;
        let writeChar = null;
        let notifyChar = null;
        let isNotifying = false;

        function log(message) {
            const div = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `[${time}] ${message}<br>`;
            div.scrollTop = div.scrollHeight;
            console.log(message);
        }

        async function connectDevice() {
            try {
                log("🔍 連接 ERICA...");
                
                device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                
                const server = await device.gatt.connect();
                log("✅ 連接成功");
                
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                
                // 獲取寫入特徵
                writeChar = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                log("✅ 獲取寫入特徵");
                
                // 獲取通知特徵
                notifyChar = await service.getCharacteristic('0000ffe2-0000-1000-8000-00805f9b34fb');
                log("✅ 獲取通知特徵");
                
            } catch (error) {
                log(`❌ 連接失敗: ${error.message}`);
            }
        }

        async function enableNotifications() {
            if (!notifyChar) {
                log("❌ 請先連接設備");
                return;
            }
            
            try {
                log("🔔 啟用通知監聽...");
                
                notifyChar.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value;
                    const bytes = Array.from(new Uint8Array(value));
                    const text = new TextDecoder('utf-8', {ignoreBOM: true, fatal: false}).decode(value);
                    
                    log(`📨 收到通知: [${bytes.join(', ')}]`);
                    if (text && text.length > 0 && /^[\x20-\x7E]*$/.test(text)) {
                        log(`📨 文字內容: "${text}"`);
                    }
                });
                
                await notifyChar.startNotifications();
                isNotifying = true;
                log("✅ 通知監聽已啟用");
                
            } catch (error) {
                log(`❌ 啟用通知失敗: ${error.message}`);
            }
        }

        async function testHandshake() {
            if (!writeChar || !isNotifying) {
                log("❌ 請先連接設備並啟用通知");
                return;
            }
            
            log("🤝 開始握手測試...");
            
            const handshakes = [
                { name: "查詢設備狀態", data: [0x01] },
                { name: "初始化命令", data: [0x00] },
                { name: "設備喚醒", data: [0xFF, 0x00] },
                { name: "認證序列", data: [0xAA, 0x55] },
                { name: "BEKEN 初始化", data: [0x42, 0x4B] }, // "BK"
                { name: "獲取版本", data: [0x56] }, // "V"
                { name: "設置模式", data: [0x4D, 0x01] }, // "M" + mode
                { name: "準備就緒", data: [0x52, 0x44, 0x59] }, // "RDY"
                { name: "開始會話", data: [0x53, 0x54, 0x41, 0x52, 0x54] }, // "START"
                { name: "連接確認", data: [0x43, 0x4F, 0x4E, 0x4E] }, // "CONN"
            ];
            
            for (let i = 0; i < handshakes.length; i++) {
                const hs = handshakes[i];
                log(`🤝 ${i+1}/10: ${hs.name} [${hs.data.join(', ')}]`);
                
                try {
                    await writeChar.writeValue(new Uint8Array(hs.data));
                    log(`   ✅ 發送成功，等待回應...`);
                    
                    // 等待 2 秒看設備回應
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                } catch (error) {
                    log(`   ❌ 發送失敗: ${error.message}`);
                }
            }
            
            log("🤝 握手測試完成");
        }

        async function testVibration() {
            if (!writeChar || !isNotifying) {
                log("❌ 請先連接設備並啟用通知");
                return;
            }
            
            log("🎯 開始振動測試...");
            
            const vibrateCommands = [
                { name: "BEKEN 振動命令 1", data: [0x56, 0x31] }, // "V1"
                { name: "BEKEN 振動命令 2", data: [0x56, 0x49, 0x42] }, // "VIB"
                { name: "振動強度 20", data: [0x56, 0x32, 0x30] }, // "V20"
                { name: "振動強度 50", data: [0x56, 0x35, 0x30] }, // "V50"
                { name: "開始振動", data: [0x4F, 0x4E] }, // "ON"
                { name: "設備控制", data: [0x43, 0x54, 0x52, 0x4C, 0x32, 0x30] }, // "CTRL20"
                { name: "電機啟動", data: [0x4D, 0x4F, 0x54, 0x4F, 0x52, 0x32, 0x30] }, // "MOTOR20"
                { name: "PWM 控制", data: [0x50, 0x57, 0x4D, 0x32, 0x30] }, // "PWM20"
                { name: "強度設定", data: [0x49, 0x4E, 0x54, 0x32, 0x30] }, // "INT20"
                { name: "功率設定", data: [0x50, 0x4F, 0x57, 0x45, 0x52, 0x32, 0x30] }, // "POWER20"
                { name: "字節振動 20", data: [20] },
                { name: "字節振動 50", data: [50] },
                { name: "字節振動 100", data: [100] },
                { name: "雙字節 0x01+20", data: [0x01, 20] },
                { name: "雙字節 0x02+50", data: [0x02, 50] },
            ];
            
            for (let i = 0; i < vibrateCommands.length; i++) {
                const cmd = vibrateCommands[i];
                log(`🎯 ${i+1}/15: ${cmd.name} [${cmd.data.join(', ')}]`);
                
                try {
                    await writeChar.writeValue(new Uint8Array(cmd.data));
                    log(`   ✅ 發送成功，測試 3 秒...`);
                    
                    // 等待 3 秒
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    
                    // 嘗試停止
                    try {
                        await writeChar.writeValue(new Uint8Array([0x4F, 0x46, 0x46])); // "OFF"
                        await new Promise(resolve => setTimeout(resolve, 200));
                        await writeChar.writeValue(new Uint8Array([0])); // 0
                        log(`   ⏹️ 發送停止命令`);
                    } catch (e) {
                        // 忽略停止錯誤
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                } catch (error) {
                    log(`   ❌ 發送失敗: ${error.message}`);
                }
            }
            
            log("🎯 振動測試完成！");
        }

        // 初始化
        log("頁面載入完成 - BEKEN 協議測試");
        
        document.getElementById('connectBtn').onclick = connectDevice;
        document.getElementById('notifyBtn').onclick = enableNotifications;
        document.getElementById('handshakeBtn').onclick = testHandshake;
        document.getElementById('vibrateBtn').onclick = testVibration;
        
        log("🎉 BEKEN 協議測試工具準備就緒");
    </script>
</body>
</html>
