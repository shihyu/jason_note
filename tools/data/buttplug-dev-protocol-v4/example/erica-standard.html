<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ERICA 標準 Buttplug 版本</title>
</head>
<body>
    <h2>ERICA 控制面板 (標準 Buttplug API)</h2>
    <p style="color: green;">✅ 使用正統 Buttplug 設備配置和 device.vibrate() API</p>
    
    <div style="margin: 20px 0;">
        <button id="b" style="padding: 15px; background: blue; color: white; font-size: 16px;">掃描設備 (標準模式)</button>
    </div>
    
    <div style="margin: 20px 0;">
        <h3>振動控制</h3>
        <div style="margin: 10px 0;">
            <label for="vibrateSlider">振動強度: </label>
            <input type="range" id="vibrateSlider" min="0" max="100" value="20" style="width: 200px;">
            <span id="vibrateValue">20%</span>
        </div>
        <div style="margin: 10px 0;">
            <button id="vibrateBtn" style="padding: 10px; background: red; color: white;">開始振動 (標準API)</button>
            <button id="stopBtn" style="padding: 10px; background: gray; color: white;">停止振動 (標準API)</button>
        </div>
    </div>
    
    <div style="margin: 20px 0;">
        <h3>設備列表</h3>
        <div id="deviceList" style="border: 1px solid #ccc; padding: 10px; min-height: 100px;">
            尚未找到設備
        </div>
    </div>

    <script type="module" src="./index-standard.js"></script>
</body>
</html>
