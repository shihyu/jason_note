<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ERICA 深度調試</title>
</head>
<body>
    <h2>ERICA 深度調試測試</h2>
    <p style="color: red;">🔬 詳細協議分析和激活測試</p>
    
    <div style="margin: 20px 0;">
        <button id="scanBtn" style="padding: 15px; background: blue; color: white;">掃描並連接</button>
        <button id="activateBtn" style="padding: 15px; background: green; color: white;" disabled>激活設備</button>
        <button id="testProtocolBtn" style="padding: 15px; background: orange; color: white;" disabled>測試多種協議</button>
    </div>
    
    <div style="margin: 20px 0;">
        <h3>手動命令測試</h3>
        <div style="margin: 10px 0;">
            <input type="text" id="customCommand" placeholder="輸入16進制命令，如：55 03 00 00 00 05" style="width: 300px;">
            <button id="sendCustomBtn" style="padding: 5px;" disabled>發送自定義命令</button>
        </div>
    </div>
    
    <div id="logs" style="border: 1px solid #ccc; padding: 10px; margin: 10px 0; height: 500px; overflow-y: scroll; font-family: monospace; font-size: 10px; background: #f5f5f5;">
    </div>

    <script>
        let device = null;
        let writeCharacteristic = null;
        let notifyCharacteristic = null;
        let isConnected = false;

        function log(message) {
            const div = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `<div style="margin: 1px 0;">[${time}] ${message}</div>`;
            div.scrollTop = div.scrollHeight;
            console.log(message);
        }

        function updateButtons() {
            document.getElementById('activateBtn').disabled = !isConnected;
            document.getElementById('testProtocolBtn').disabled = !isConnected;
            document.getElementById('sendCustomBtn').disabled = !isConnected;
        }

        async function scanAndConnect() {
            try {
                log("🔍 <strong>掃描 ERICA...</strong>");
                
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ERICA' }],
                    optionalServices: [
                        '0000ffe0-0000-1000-8000-00805f9b34fb',
                        'device_information'
                    ]
                });
                
                log(`✅ 找到: ${device.name} (ID: ${device.id})`);
                
                const server = await device.gatt.connect();
                log("✅ GATT 連接成功");
                
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                log("✅ 服務獲取成功");
                
                writeCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                log("✅ 寫入特徵獲取成功");
                
                try {
                    notifyCharacteristic = await service.getCharacteristic('0000ffe2-0000-1000-8000-00805f9b34fb');
                    
                    notifyCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
                        const value = event.target.value;
                        const bytes = Array.from(new Uint8Array(value));
                        const hex = bytes.map(b => b.toString(16).padStart(2, '0')).join(' ');
                        log(`📨 <span style="color: purple;">收到: [${bytes.join(', ')}] = [0x${hex}]</span>`);
                    });
                    
                    await notifyCharacteristic.startNotifications();
                    log("✅ 通知啟用成功");
                } catch (e) {
                    log("⚠️ 通知特徵不可用");
                }
                
                isConnected = true;
                updateButtons();
                log("🎉 <strong style=\"color: green;\">連接完成！</strong>");
                
            } catch (error) {
                log(`❌ <span style="color: red;">錯誤: ${error.message}</span>`);
            }
        }

        async function sendCommand(bytes, description) {
            if (!writeCharacteristic) return false;
            
            try {
                const hex = bytes.map(b => b.toString(16).padStart(2, '0')).join(' ');
                log(`📤 發送 ${description}: [${bytes.join(', ')}] = [0x${hex}]`);
                
                await writeCharacteristic.writeValue(new Uint8Array(bytes));
                log(`✅ 命令發送成功`);
                
                // 等待回應
                await new Promise(resolve => setTimeout(resolve, 100));
                return true;
            } catch (error) {
                log(`❌ <span style="color: red;">發送失敗: ${error.message}</span>`);
                return false;
            }
        }

        async function activateDevice() {
            log("🔧 <strong>嘗試激活 ERICA 設備...</strong>");
            
            // 嘗試各種可能的激活命令
            const activationCommands = [
                { cmd: [0x55, 0x01, 0x00], desc: "Svakom 基本激活" },
                { cmd: [0x55, 0x02, 0x00], desc: "Svakom 握手" },
                { cmd: [0x55, 0x00, 0x00], desc: "Svakom 初始化" },
                { cmd: [0x01], desc: "簡單激活" },
                { cmd: [0x00], desc: "重置命令" },
                { cmd: [0x55, 0x03, 0x00, 0x01, 0x00, 0x00], desc: "Svakom 模式設定" },
            ];
            
            for (const activation of activationCommands) {
                await sendCommand(activation.cmd, activation.desc);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            log("🔧 激活序列完成");
        }

        async function testProtocols() {
            log("🧪 <strong>測試多種振動協議...</strong>");
            
            const protocols = [
                // Svakom 原始協議
                { cmd: [0x55, 0x03, 0x00, 0x00, 0x00, 0x03], desc: "Svakom 標準 (強度3)", wait: 2000 },
                
                // Svakom 變體
                { cmd: [0x55, 0x04, 0x00, 0x00, 0x00, 0x03], desc: "Svakom 變體1", wait: 2000 },
                { cmd: [0x55, 0x03, 0x01, 0x00, 0x00, 0x03], desc: "Svakom 變體2", wait: 2000 },
                { cmd: [0x55, 0x03, 0x00, 0x01, 0x00, 0x03], desc: "Svakom 變體3", wait: 2000 },
                
                // 其他可能的協議
                { cmd: [0x01, 0x03], desc: "簡化協議1", wait: 2000 },
                { cmd: [0x20, 0x03], desc: "簡化協議2", wait: 2000 },
                { cmd: [0x03], desc: "最簡協議", wait: 2000 },
                
                // BEKEN 晶片協議
                { cmd: [0xA0, 0x03], desc: "BEKEN 協議1", wait: 2000 },
                { cmd: [0xF0, 0x03], desc: "BEKEN 協議2", wait: 2000 },
                
                // 停止命令測試
                { cmd: [0x55, 0x03, 0x00, 0x00, 0x00, 0x00], desc: "停止", wait: 1000 },
            ];
            
            for (let i = 0; i < protocols.length; i++) {
                const protocol = protocols[i];
                log(`🎮 <strong>測試 ${i+1}/${protocols.length}: ${protocol.desc}</strong>`);
                
                await sendCommand(protocol.cmd, protocol.desc);
                
                log(`⏱️ 等待 ${protocol.wait}ms...`);
                await new Promise(resolve => setTimeout(resolve, protocol.wait));
            }
            
            log("🏁 <strong style=\"color: green;\">協議測試完成</strong>");
        }

        async function sendCustomCommand() {
            const input = document.getElementById('customCommand').value.trim();
            if (!input) return;
            
            try {
                // 解析16進制輸入
                const bytes = input.split(/[\s,]+/).map(hex => {
                    const num = parseInt(hex, 16);
                    if (isNaN(num) || num < 0 || num > 255) {
                        throw new Error(`無效的16進制數字: ${hex}`);
                    }
                    return num;
                });
                
                await sendCommand(bytes, "自定義命令");
                
            } catch (error) {
                log(`❌ <span style="color: red;">自定義命令錯誤: ${error.message}</span>`);
            }
        }

        // 初始化
        log("<span style=\"color: blue; font-weight: bold;\">[初始化] ERICA 深度調試模式</span>");
        log("🔬 <strong>目標</strong>：找出正確的激活和振動協議");
        log("📋 <strong>步驟</strong>：1) 掃描連接 → 2) 激活設備 → 3) 測試協議");
        
        document.getElementById('scanBtn').onclick = scanAndConnect;
        document.getElementById('activateBtn').onclick = activateDevice;
        document.getElementById('testProtocolBtn').onclick = testProtocols;
        document.getElementById('sendCustomBtn').onclick = sendCustomCommand;
        
        // 自定義命令輸入框回車事件
        document.getElementById('customCommand').onkeypress = (e) => {
            if (e.key === 'Enter') {
                sendCustomCommand();
            }
        };
        
        updateButtons();
        log("🎉 <strong style=\"color: green;\">準備完成！請依序測試</strong>");
    </script>
</body>
</html>
