<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>藍牙掃描測試</title>
</head>
<body>
    <h2>藍牙掃描測試頁面</h2>
    
    <div>
        <button id="scanBtn">掃描藍牙設備</button>
        <button id="testBtn">測試按鈕</button>
    </div>
    
    <div id="logs" style="border: 1px solid #ccc; padding: 10px; margin: 10px 0; height: 400px; overflow-y: scroll; font-family: monospace; font-size: 12px;">
    </div>

    <script>
        function addLog(message) {
            const logDiv = document.getElementById('logs');
            const p = document.createElement('div');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        async function scanBluetoothDevices() {
            try {
                addLog("開始藍牙設備掃描...");
                
                // 檢查瀏覽器是否支援 Web Bluetooth
                if (!navigator.bluetooth) {
                    addLog("❌ 此瀏覽器不支援 Web Bluetooth");
                    addLog("請使用 Chrome/Edge 桌面版本或 Chrome Android");
                    return;
                }
                
                addLog("✅ 瀏覽器支援 Web Bluetooth");
                
                // 檢查 HTTPS
                if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                    addLog("⚠️ Web Bluetooth 需要 HTTPS 或 localhost");
                }
                
                addLog("正在請求藍牙設備訪問權限...");
                
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        'device_information',
                        'battery_service',
                        '0000180f-0000-1000-8000-00805f9b34fb',
                        '0000180a-0000-1000-8000-00805f9b34fb',
                    ]
                });
                
                if (device) {
                    addLog(`🎯 找到設備: ${device.name || '未命名設備'}`);
                    addLog(`📱 設備 ID: ${device.id}`);
                    
                    // 嘗試連接
                    addLog("正在連接到設備...");
                    const server = await device.gatt.connect();
                    addLog(`✅ 成功連接到 ${device.name}`);
                    
                    // 獲取服務
                    const services = await server.getPrimaryServices();
                    addLog(`📋 找到 ${services.length} 個服務`);
                    
                    for (let i = 0; i < Math.min(services.length, 3); i++) {
                        const service = services[i];
                        addLog(`  服務 ${i+1}: ${service.uuid}`);
                    }
                    
                    addLog("🎉 掃描完成！");
                } else {
                    addLog("沒有選擇設備");
                }
                
            } catch (error) {
                addLog(`❌ 錯誤: ${error.name} - ${error.message}`);
                
                if (error.name === 'NotFoundError') {
                    addLog("提示: 請確保藍牙設備已開啟且可被發現");
                } else if (error.name === 'SecurityError') {
                    addLog("提示: 需要用戶手勢觸發掃描");
                } else if (error.name === 'NotSupportedError') {
                    addLog("提示: 瀏覽器或設備不支援此功能");
                }
            }
        }

        // 頁面載入完成後綁定事件
        window.addEventListener('load', () => {
            addLog("頁面已載入，準備就緒");
            
            document.getElementById('scanBtn').addEventListener('click', () => {
                addLog("掃描按鈕被點擊");
                scanBluetoothDevices();
            });
            
            document.getElementById('testBtn').addEventListener('click', () => {
                addLog("測試按鈕被點擊 - 功能正常");
            });
        });
    </script>
</body>
</html>
