<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ERICA 設備深度分析</title>
</head>
<body>
    <h2>ERICA 設備深度分析</h2>
    
    <div>
        <button id="connectBtn" style="padding: 10px; margin: 5px; background: blue; color: white;">連接 ERICA</button>
        <button id="readBtn" style="padding: 10px; margin: 5px; background: green; color: white;">讀取設備信息</button>
        <button id="testBtn" style="padding: 10px; margin: 5px; background: orange; color: white;">高級協議測試</button>
    </div>
    
    <div id="logs" style="border: 1px solid #ccc; padding: 10px; margin: 10px 0; height: 500px; overflow-y: scroll; font-family: monospace; font-size: 11px;">
    </div>

    <script>
        let device = null;
        let characteristic = null;

        function log(message) {
            const div = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `[${time}] ${message}<br>`;
            div.scrollTop = div.scrollHeight;
            console.log(message);
        }

        async function connectToERICA() {
            try {
                log("🔍 搜尋 ERICA 設備...");
                
                device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        'device_information',
                        'battery_service',
                        '0000ffe0-0000-1000-8000-00805f9b34fb',
                        '00001800-0000-1000-8000-00805f9b34fb',
                        '00001801-0000-1000-8000-00805f9b34fb',
                    ]
                });
                
                if (device.name !== 'ERICA') {
                    log("⚠️ 請選擇 ERICA 設備");
                    return;
                }
                
                log(`✅ 找到 ERICA: ${device.id}`);
                
                const server = await device.gatt.connect();
                log("✅ GATT 連接成功");
                
                // 獲取所有服務
                const services = await server.getPrimaryServices();
                log(`📋 找到 ${services.length} 個服務:`);
                
                for (const service of services) {
                    log(`  📦 服務: ${service.uuid}`);
                    
                    try {
                        const chars = await service.getCharacteristics();
                        for (const char of chars) {
                            const props = [];
                            if (char.properties.read) props.push('read');
                            if (char.properties.write) props.push('write');
                            if (char.properties.writeWithoutResponse) props.push('writeNoResp');
                            if (char.properties.notify) props.push('notify');
                            if (char.properties.indicate) props.push('indicate');
                            
                            log(`    🔧 特徵: ${char.uuid} [${props.join(', ')}]`);
                            
                            // 保存寫入特徵
                            if (char.properties.write || char.properties.writeWithoutResponse) {
                                characteristic = char;
                                log(`    🎯 保存為控制特徵`);
                            }
                        }
                    } catch (e) {
                        log(`    ❌ 無法讀取特徵: ${e.message}`);
                    }
                }
                
            } catch (error) {
                log(`❌ 連接失敗: ${error.message}`);
            }
        }

        async function readDeviceInfo() {
            if (!device || !device.gatt.connected) {
                log("❌ 請先連接設備");
                return;
            }
            
            try {
                log("📖 讀取設備詳細信息...");
                
                // 嘗試讀取設備信息服務
                try {
                    const service = await device.gatt.getPrimaryService('device_information');
                    const chars = await service.getCharacteristics();
                    
                    for (const char of chars) {
                        if (char.properties.read) {
                            try {
                                const value = await char.readValue();
                                const text = new TextDecoder().decode(value);
                                log(`📄 ${char.uuid}: "${text}"`);
                            } catch (e) {
                                log(`📄 ${char.uuid}: 無法讀取`);
                            }
                        }
                    }
                } catch (e) {
                    log("📄 設備信息服務不可用");
                }
                
                // 嘗試讀取其他可讀特徵
                log("🔍 搜尋其他可讀特徵...");
                const services = await device.gatt.getPrimaryServices();
                
                for (const service of services) {
                    if (service.uuid === '0000180a-0000-1000-8000-00805f9b34fb') continue; // 跳過已讀取的
                    
                    try {
                        const chars = await service.getCharacteristics();
                        for (const char of chars) {
                            if (char.properties.read) {
                                try {
                                    const value = await char.readValue();
                                    const bytes = Array.from(new Uint8Array(value));
                                    log(`📊 ${char.uuid}: [${bytes.join(', ')}]`);
                                } catch (e) {
                                    log(`📊 ${char.uuid}: 讀取失敗`);
                                }
                            }
                        }
                    } catch (e) {
                        // 忽略
                    }
                }
                
            } catch (error) {
                log(`❌ 讀取失敗: ${error.message}`);
            }
        }

        async function advancedProtocolTest() {
            if (!characteristic) {
                log("❌ 請先連接設備並找到控制特徵");
                return;
            }
            
            log("🧪 開始高級協議測試...");
            
            // 更多協議變化
            const protocols = [
                { name: "激活命令 0xFF", data: [0xFF] },
                { name: "激活命令 0xAA", data: [0xAA] },
                { name: "激活命令 0x55", data: [0x55] },
                { name: "雙 0xFF", data: [0xFF, 0xFF] },
                { name: "啟動序列 1", data: [0xFF, 0x01, 0x50] },
                { name: "啟動序列 2", data: [0xAA, 0x55, 0x50] },
                { name: "三字節魔法", data: [0xF0, 0xAA, 0x50] },
                { name: "Lovense 模擬", data: [0x43, 0x3A, 0x32, 0x30] }, // "C:20"
                { name: "VibrateCmd", data: Array.from(new TextEncoder().encode("VibrateCmd:20")) },
                { name: "簡單 V 命令", data: Array.from(new TextEncoder().encode("V20")) },
                { name: "震動開始", data: Array.from(new TextEncoder().encode("START:20")) },
                { name: "設置模式", data: [0x01, 0x02, 0x50] },
                { name: "連續強度", data: [50, 50, 50] },
                { name: "遞增測試", data: [10, 20, 30, 40, 50] },
                { name: "最大強度", data: [255] },
                { name: "特殊序列", data: [0xDE, 0xAD, 0xBE, 0xEF] },
            ];
            
            for (let i = 0; i < protocols.length; i++) {
                const protocol = protocols[i];
                log(`🔬 測試 ${i+1}/16: ${protocol.name}`);
                log(`   發送: [${protocol.data.join(', ')}]`);
                
                try {
                    await characteristic.writeValue(new Uint8Array(protocol.data));
                    log(`   ✅ 發送成功，等待 3 秒觀察效果...`);
                    
                    // 等待 3 秒
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    
                    // 嘗試停止命令
                    try {
                        await characteristic.writeValue(new Uint8Array([0]));
                        log(`   ⏹️ 停止命令發送`);
                    } catch (e) {
                        log(`   ⚠️ 停止命令失敗: ${e.message}`);
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                } catch (error) {
                    log(`   ❌ 發送失敗: ${error.message}`);
                }
            }
            
            log("🏁 高級協議測試完成！");
            log("💡 如果仍然沒有振動，可能需要特殊的激活序列或認證");
        }

        // 初始化
        log("頁面載入完成");
        
        document.getElementById('connectBtn').onclick = connectToERICA;
        document.getElementById('readBtn').onclick = readDeviceInfo;
        document.getElementById('testBtn').onclick = advancedProtocolTest;
        
        log("🎉 ERICA 深度分析工具準備就緒");
    </script>
</body>
</html>
