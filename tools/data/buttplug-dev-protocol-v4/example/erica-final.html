<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ERICA 最終版本</title>
</head>
<body>
    <h2>ERICA 控制面板</h2>
    
    <div style="margin: 20px 0;">
        <button id="scanBtn" style="padding: 10px; background: blue; color: white;">掃描 ERICA</button>
        <button id="connectBtn" style="padding: 10px; background: green; color: white;" disabled>連接設備</button>
        <button id="testBtn" style="padding: 10px; background: orange; color: white;" disabled>測試振動</button>
    </div>
    
    <div style="margin: 20px 0;">
        <h3>振動控制</h3>
        <div style="margin: 10px 0;">
            <label for="vibrateSlider">振動強度: </label>
            <input type="range" id="vibrateSlider" min="0" max="100" value="20" style="width: 200px;" disabled>
            <span id="vibrateValue">20%</span>
        </div>
        <div style="margin: 10px 0;">
            <button id="vibrateBtn" style="padding: 10px; background: red; color: white;" disabled>開始振動</button>
            <button id="stopBtn" style="padding: 10px; background: gray; color: white;" disabled>停止振動</button>
        </div>
    </div>
    
    <div style="margin: 20px 0;">
        <h3>設備狀態</h3>
        <div id="deviceStatus" style="border: 1px solid #ccc; padding: 10px; min-height: 50px;">
            尚未連接設備
        </div>
    </div>
    
    <div id="logs" style="border: 1px solid #ccc; padding: 10px; margin: 10px 0; height: 400px; overflow-y: scroll; font-family: monospace; font-size: 11px;">
    </div>

    <script>
        let device = null;
        let writeCharacteristic = null;
        let notifyCharacteristic = null;
        let isConnected = false;
        let isVibrating = false;

        function log(message) {
            const div = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `[${time}] ${message}<br>`;
            div.scrollTop = div.scrollHeight;
            console.log(message);
        }

        function updateStatus(status) {
            document.getElementById('deviceStatus').innerHTML = status;
        }

        function updateButtons() {
            document.getElementById('connectBtn').disabled = !device || isConnected;
            document.getElementById('testBtn').disabled = !isConnected;
            document.getElementById('vibrateSlider').disabled = !isConnected;
            document.getElementById('vibrateBtn').disabled = !isConnected;
            document.getElementById('stopBtn').disabled = !isConnected;
        }

        async function scanForErica() {
            try {
                log("🔍 掃描 ERICA 設備...");
                
                device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { name: 'ERICA' }
                    ],
                    optionalServices: [
                        '0000ffe0-0000-1000-8000-00805f9b34fb',
                        'device_information'
                    ]
                });
                
                log(`✅ 找到 ERICA: ${device.name}`);
                updateStatus(`已找到設備: ${device.name}<br>設備 ID: ${device.id}`);
                updateButtons();
                
            } catch (error) {
                log(`❌ 掃描失敗: ${error.message}`);
            }
        }

        async function connectToErica() {
            if (!device) return;
            
            try {
                log("🔗 連接到 ERICA...");
                
                const server = await device.gatt.connect();
                log("✅ GATT 連接成功");
                
                // 獲取主要服務
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                log("✅ 獲取服務成功");
                
                // 獲取寫入特徵
                writeCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                log("✅ 獲取寫入特徵");
                
                // 獲取通知特徵
                try {
                    notifyCharacteristic = await service.getCharacteristic('0000ffe2-0000-1000-8000-00805f9b34fb');
                    
                    // 啟用通知
                    notifyCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
                        const value = event.target.value;
                        const bytes = Array.from(new Uint8Array(value));
                        log(`📨 收到回應: [${bytes.join(', ')}]`);
                    });
                    
                    await notifyCharacteristic.startNotifications();
                    log("✅ 通知已啟用");
                } catch (e) {
                    log("⚠️ 通知特徵不可用");
                }
                
                isConnected = true;
                updateStatus(`✅ 已連接到 ${device.name}<br>可以開始振動控制`);
                updateButtons();
                
                // 斷線監聽
                device.addEventListener('gattserverdisconnected', () => {
                    log("🔌 設備已斷線");
                    isConnected = false;
                    isVibrating = false;
                    updateStatus("設備已斷線");
                    updateButtons();
                });
                
            } catch (error) {
                log(`❌ 連接失敗: ${error.message}`);
            }
        }

        async function testVibration() {
            if (!writeCharacteristic) return;
            
            try {
                log("🧪 測試 ERICA 振動協議...");
                
                // 使用正確的 Svakom ERICA 協議進行測試
                const testSequences = [
                    { name: "Svakom 低強度 (強度1)", data: [0x55, 0x03, 0x00, 0x00, 0x00, 0x01] },
                    { name: "Svakom 中強度 (強度5)", data: [0x55, 0x03, 0x00, 0x00, 0x00, 0x05] },
                    { name: "Svakom 高強度 (強度10)", data: [0x55, 0x03, 0x00, 0x00, 0x00, 0x0A] },
                    { name: "Svakom 預設模式1", data: [0x55, 0x03, 0x00, 0x03, 0x01, 0x05] },
                    { name: "Svakom 預設模式3", data: [0x55, 0x03, 0x00, 0x03, 0x03, 0x05] },
                ];
                
                for (let i = 0; i < testSequences.length; i++) {
                    const seq = testSequences[i];
                    log(`🔬 測試 ${i+1}: ${seq.name} [${seq.data.join(', ')}]`);
                    
                    try {
                        await writeCharacteristic.writeValue(new Uint8Array(seq.data));
                        log(`✅ 發送成功，等待 2 秒...`);
                        
                        await new Promise(resolve => setTimeout(resolve, 2000));
                        
                        // 發送 Svakom 停止命令
                        await writeCharacteristic.writeValue(new Uint8Array([0x55, 0x03, 0x00, 0x00, 0x00, 0x00]));
                        log(`⏹️ Svakom 停止命令`);
                        
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        
                    } catch (error) {
                        log(`❌ 測試 ${i+1} 失敗: ${error.message}`);
                    }
                }
                
                log("🏁 測試完成！");
                
            } catch (error) {
                log(`❌ 測試失敗: ${error.message}`);
            }
        }

        async function startVibration() {
            if (!writeCharacteristic) return;
            
            const slider = document.getElementById('vibrateSlider');
            const intensityPercent = parseInt(slider.value);
            
            // 將百分比轉換為 Svakom 強度值 (1-10)
            const svakomIntensity = Math.max(1, Math.round(intensityPercent / 10));
            
            try {
                isVibrating = true;
                log(`🎮 開始振動，強度: ${intensityPercent}% (Svakom值: ${svakomIntensity})`);
                
                // 使用正確的 Svakom ERICA 協議
                const svakomCommand = new Uint8Array([
                    0x55, 0x03, 0x00,  // 固定頭部
                    0x00,              // kind: 普通振動
                    0x00,              // preset: 無預設
                    svakomIntensity    // intensity: 1-10
                ]);
                
                await writeCharacteristic.writeValue(svakomCommand);
                log(`✅ Svakom 振動命令發送: [${Array.from(svakomCommand).join(', ')}]`);
                log(`📋 命令解析: 頭部[55,03,00] + 普通振動[00] + 無預設[00] + 強度[${svakomIntensity}]`);
                
            } catch (error) {
                log(`❌ 振動失敗: ${error.message}`);
                isVibrating = false;
            }
        }

        async function stopVibration() {
            if (!writeCharacteristic) return;
            
            try {
                isVibrating = false;
                log("🛑 停止振動");
                
                // 使用正確的 Svakom 停止命令
                const svakomStopCommand = new Uint8Array([
                    0x55, 0x03, 0x00,  // 固定頭部
                    0x00,              // kind: 普通振動
                    0x00,              // preset: 無預設
                    0x00               // intensity: 0 (停止)
                ]);
                
                await writeCharacteristic.writeValue(svakomStopCommand);
                log(`✅ Svakom 停止命令發送: [${Array.from(svakomStopCommand).join(', ')}]`);
                
            } catch (error) {
                log(`❌ 停止失敗: ${error.message}`);
            }
        }

        async function updateVibrationIntensity() {
            if (!isVibrating || !writeCharacteristic) return;
            
            const slider = document.getElementById('vibrateSlider');
            const intensityPercent = parseInt(slider.value);
            const svakomIntensity = Math.max(1, Math.round(intensityPercent / 10));
            
            try {
                // 使用 Svakom 協議動態調整強度
                const svakomCommand = new Uint8Array([
                    0x55, 0x03, 0x00,  // 固定頭部
                    0x00,              // kind: 普通振動
                    0x00,              // preset: 無預設
                    svakomIntensity    // intensity: 1-10
                ]);
                
                await writeCharacteristic.writeValue(svakomCommand);
                log(`🔧 調整強度到 ${intensityPercent}% (Svakom值: ${svakomIntensity})`);
            } catch (error) {
                // 忽略調整錯誤
            }
        }

        // 初始化
        log("頁面載入完成 - ERICA 最終版本");
        
        document.getElementById('scanBtn').onclick = scanForErica;
        document.getElementById('connectBtn').onclick = connectToErica;
        document.getElementById('testBtn').onclick = testVibration;
        document.getElementById('vibrateBtn').onclick = startVibration;
        document.getElementById('stopBtn').onclick = stopVibration;
        
        // 滑桿事件
        const slider = document.getElementById('vibrateSlider');
        const valueDisplay = document.getElementById('vibrateValue');
        
        slider.oninput = () => {
            valueDisplay.textContent = slider.value + '%';
            if (isVibrating) {
                updateVibrationIntensity();
            }
        };
        
        updateButtons();
        log("🎉 ERICA 控制器準備就緒");
    </script>
</body>
</html>
