<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance BTC/USDT 即時報價</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Binance 即時報價</h1>
            <div id="status" class="status-disconnected">未連線</div>
        </header>

        <main class="card">
            <div class="symbol">BTC / USDT</div>
            <div id="price" class="price">--.---</div>
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">成交量 (Quantity)</span>
                    <span id="quantity" class="value">--.---</span>
                </div>
                <div class="info-item">
                    <span class="label">時間</span>
                    <span id="timestamp" class="value">--:--:--</span>
                </div>
            </div>
        </main>

        <footer>
            <p>資料來源：Binance WebSocket API</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
